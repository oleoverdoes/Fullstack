<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
</head>
<body>
    <header>
        <h1>Contact Page</h1>
    </header>

    <main> 
        <section id="contact"> 
            <h2>Contact Us</h2>
            <p>Please fill out the form below to get in touch with us:</p>
            
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required maxlength="50">
                <br><br>
              
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required maxlength="100">
                <br><br>       
              
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" maxlength="10">
                <br><br>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <br><br>

                <fieldset>
                    <legend>Preferred Contact Method</legend>  
                    <input type="radio" id="contact-email" name="contact-method" value="email" checked>
                    <label for="contact-email">Email</label><br>
                    
                    <input type="radio" id="contact-phone" name="contact-method" value="phone">
                    <label for="contact-phone">Phone</label><br>
                </fieldset> 
                <br>

                <input type="submit" value="Submit">
                <input type="reset" value="Cancel">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 6710510290 Phuwadeth Keawloy.</p>
    </footer>
</body>
</html>
